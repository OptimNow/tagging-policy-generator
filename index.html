            <li>Export to JSON, Markdown, AWS Organizations Tag Policy, GCP Label Policy, or Azure Policy Initiative</li>

            <li><strong>Azure Policy Initiative</strong> — Azure Policy definitions with deny/audit effects and tag inheritance recommendations</li>
